name: CI
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: dax/package-lock.json
      - name: Install dependencies
        working-directory: dax
        run: npm ci --ignore-scripts
      - name: Run tests
        working-directory: dax
        run: npm test

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dax/package-lock.json
      - name: Install dependencies
        working-directory: dax
        run: npm ci --ignore-scripts
      - name: Build renderer
        working-directory: dax
        run: npx --prefix src/renderer vite build --config src/renderer/vite.config.js
